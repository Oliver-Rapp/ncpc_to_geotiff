# Default Output Name
# This is used if -o is not passed in the CLI. 
# If this is missing, the script defaults to {input_filename}.tif
#output_file: "output_raster.tif"

# Grid Settings
grid:
  # The size of one pixel in the units of the CRS (meters)
  resolution: 0.5
  
  # 'rounded' aligns the grid to integer coordinates, 
  # 'exact' uses the precise min/max of the point cloud.
  bounds_strategy: "exact"

# Processing Settings
processing:
  # Chunk size for reading NetCDF. 
  # 500,000 is a conservative start. Increase if you have >16GB RAM.
  chunk_size: 5000000 

# Visualization / Bands
# Define what goes into the GeoTIFF channels.
# Common Nodata values: 
#   For Float32: -9999.0
#   For Byte (0-255 RGB): 0 (Warning: this makes true black transparent)
output_bands:
  - variable: "red"
    method: "mean"   # Options: mean, min, max, count
    nodata_val: -9999
  - variable: "green"
    method: "mean"
    nodata_val: -9999
  - variable: "blue"
    method: "mean"
    nodata_val: -9999

